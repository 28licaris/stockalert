[alembic]
script_location = migrations
prepend_sys_path = .
path_separator = os

# env.py replaces this placeholder from IDENTITY_DATABASE_URL. Keeping a
# non-secret URL here makes accidental direct use fail safely.
sqlalchemy.url = postgresql+psycopg://invalid:invalid@localhost/invalid

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
