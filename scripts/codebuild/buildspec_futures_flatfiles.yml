# CodeBuild buildspec for scripts/polygon_futures_flatfiles_backfill.py.
#
# Data path (no home-internet egress):
#   Polygon flat-files S3 (files.massive.com, us-east-1)
#     → CodeBuild compute (us-east-1, ~500 Mbps to Polygon CDN)
#     → futures.polygon_futures Iceberg (our S3, us-east-1)
#
# Full 10-year backfill of ~35 CME / COMEX / CBOT / NYMEX roots
# (~87 500 flat files) completes in roughly 3-5 hours at cloud speed
# (vs ~14 hours over a home connection).
#
# Prerequisites:
#   1. Secrets Manager secret "polygon/flatfiles" (already exists for equities):
#        access_key_id, secret_access_key
#   2. Secrets Manager secret "polygon/api":
#        api_key  ← your Polygon REST API key (used for contract discovery)
#        Create with:
#          aws secretsmanager create-secret \
#            --name polygon/api \
#            --secret-string '{"api_key":"<YOUR_POLYGON_REST_KEY>"}'
#   3. The CodeBuild execution role must have:
#        s3:GetObject / s3:PutObject on STOCK_LAKE_BUCKET
#        glue:GetDatabase / GetTable / CreateTable on the "futures" database
#        secretsmanager:GetSecretValue on polygon/flatfiles and polygon/api
#
# Launch:
#   aws codebuild start-build \
#     --project-name stockalert-futures-backfill \
#     --buildspec-override scripts/codebuild/buildspec_futures_flatfiles.yml \
#     --source-version elliot-wave \
#     --compute-type-override BUILD_GENERAL1_LARGE \
#     --timeout-in-minutes-override 480 \
#     --region us-east-1
#
# Scope override examples:
#   # Pull only 2020-2024:
#   --environment-variables-override \
#       "name=BACKFILL_START_YEAR,value=2020,type=PLAINTEXT" \
#       "name=BACKFILL_END_YEAR,value=2024,type=PLAINTEXT"
#
#   # Dry-run (downloads files, counts bars, no write):
#   --environment-variables-override \
#       "name=BACKFILL_DRY_RUN,value=true,type=PLAINTEXT"
#
#   # Single exchange group (CME only):
#   --environment-variables-override \
#       "name=BACKFILL_EXCHANGES,value=cme,type=PLAINTEXT"

version: 0.2

env:
  variables:
    AWS_REGION: us-east-1
    STOCK_LAKE_BUCKET: stock-lake-562741918372-us-east-1-an
    STOCK_LAKE_REGION: us-east-1
    ICEBERG_GLUE_DATABASE: stock_lake
    ICEBERG_FUTURES_GLUE_DATABASE: futures
    ICEBERG_WAREHOUSE_PREFIX: iceberg
    ICEBERG_CATALOG_NAME: stock_lake
    POLYGON_S3_ENDPOINT: "https://files.massive.com"
    POLYGON_S3_BUCKET: "flatfiles"
    # Overridable per-build via --environment-variables-override.
    BACKFILL_START_YEAR: "2017"
    BACKFILL_END_YEAR: "2026"
    BACKFILL_BATCH_SIZE: "10000"
    BACKFILL_DRY_RUN: ""
    # Comma-separated exchange groups to run: cme,comex,cbot,nymex (default: all)
    BACKFILL_EXCHANGES: "cme,comex,cbot,nymex"
  secrets-manager:
    POLYGON_S3_ACCESS_KEY_ID: "polygon/flatfiles:access_key_id"
    POLYGON_S3_SECRET_ACCESS_KEY: "polygon/flatfiles:secret_access_key"
    POLYGON_API_KEY: "polygon/api:api_key"

phases:
  install:
    runtime-versions:
      python: 3.12
    commands:
      - echo "=== install ==="
      - python --version
      - pip install --upgrade pip
      - pip install poetry==1.8.3
      - poetry config virtualenvs.create false
      - poetry install --without dev --no-interaction --no-ansi

  pre_build:
    commands:
      - echo "=== pre_build ==="
      - 'echo "Region                $AWS_REGION"'
      - 'echo "Bucket                $STOCK_LAKE_BUCKET"'
      - 'echo "Futures Glue DB       $ICEBERG_FUTURES_GLUE_DATABASE"'
      - 'echo "Start year            $BACKFILL_START_YEAR"'
      - 'echo "End year              $BACKFILL_END_YEAR"'
      - 'echo "Batch size            $BACKFILL_BATCH_SIZE"'
      - 'echo "Dry run               ${BACKFILL_DRY_RUN:-(no)}"'
      - 'echo "Exchanges             $BACKFILL_EXCHANGES"'
      - 'echo "Polygon endpoint      $POLYGON_S3_ENDPOINT"'
      - 'echo "Build ID              $CODEBUILD_BUILD_ID"'
      # Sanity-check: our S3, Glue, and Polygon's flat-files bucket are all reachable.
      - aws s3 ls "s3://$STOCK_LAKE_BUCKET/iceberg/" | head -3
      - aws glue get-database --name "$ICEBERG_FUTURES_GLUE_DATABASE" --query 'Database.Name' || true
      - |
        python -c "
        import boto3
        c = boto3.client('s3', endpoint_url='$POLYGON_S3_ENDPOINT',
                         aws_access_key_id='$POLYGON_S3_ACCESS_KEY_ID',
                         aws_secret_access_key='$POLYGON_S3_SECRET_ACCESS_KEY',
                         region_name='us-east-1')
        for pfx in ['us_futures_cme', 'us_futures_comex', 'us_futures_cbot', 'us_futures_nymex']:
            r = c.list_objects_v2(Bucket='$POLYGON_S3_BUCKET',
                                  Prefix=f'{pfx}/minute_aggs_v1/2024/01/',
                                  MaxKeys=1)
            found = len(r.get('Contents', []))
            print(f'{pfx}: {\"OK\" if found else \"NO FILES\"} (2024-01)')
        "

  build:
    commands:
      - echo "=== build ==="
      - chmod +x scripts/codebuild/run_futures_flatfiles.sh
      - bash scripts/codebuild/run_futures_flatfiles.sh

  post_build:
    commands:
      - echo "=== post_build ==="
      - 'echo "Build succeeding       $CODEBUILD_BUILD_SUCCEEDING"'
      - |
        poetry run python -c "
        try:
            from app.services.iceberg_catalog import get_catalog
            from app.services.futures.tables import ensure_polygon_futures
            t = ensure_polygon_futures(get_catalog())
            snap = t.current_snapshot()
            rows = int(snap.summary.additional_properties.get('total-records', 0)) if snap else 0
            print(f'futures.polygon_futures rows after build: {rows:,}')
        except Exception as e:
            print(f'post_build row count failed (non-fatal): {e}')
        " || true
