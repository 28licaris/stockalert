# CodeBuild buildspec for scripts/polygon_futures_mirror.py.
#
# Byte-for-byte mirror of Polygon futures flat files into the lake bucket:
#   Polygon flat-files S3 (files.massive.com, us-east-1)
#     → CodeBuild compute (us-east-1, in-region — no home-internet egress)
#     → s3://<lake>/polygon_flatfiles_mirror/  (our S3, us-east-1)
#
# Scope (overridable): minute_aggs_v1 + session_aggs_v1 + trades_v1, all 4
# exchanges, 2017–2026 ≈ 28,488 files / ~131 GB.  Datasets are mirrored in the
# order listed (aggregates first, trades last) so the small backtest-essential
# data lands and reconciles before the large tick dataset.
#
# Prerequisites:
#   1. Secrets Manager secret "polygon/flatfiles" (already exists):
#        access_key_id, secret_access_key
#      (No polygon/api secret needed — the mirror does NO REST calls.)
#   2. The CodeBuild service role must allow:
#        s3:PutObject / s3:GetObject / s3:ListBucket on STOCK_LAKE_BUCKET
#        secretsmanager:GetSecretValue on polygon/flatfiles
#      (Polygon read access is via the secret keys above, not IAM.)
#
# Launch (reuses the existing silver project; overrides buildspec + branch):
#   AWS_PROFILE=stockalert-admin aws codebuild start-build \
#     --project-name sockalert-silver-full-backfill \
#     --buildspec-override scripts/codebuild/buildspec_futures_mirror.yml \
#     --source-version elliot-wave \
#     --compute-type-override BUILD_GENERAL1_LARGE \
#     --timeout-in-minutes-override 480 \
#     --region us-east-1
#
# Scope override examples:
#   # Aggregates only (fast, ~7.5 GB):
#   --environment-variables-override \
#       "name=MIRROR_DATASETS,value=minute_aggs_v1 session_aggs_v1,type=PLAINTEXT"
#   # Dry run (enumerate + report, copy nothing):
#   --environment-variables-override "name=MIRROR_DRY_RUN,value=true,type=PLAINTEXT"

version: 0.2

env:
  variables:
    AWS_REGION: us-east-1
    STOCK_LAKE_BUCKET: stock-lake-562741918372-us-east-1-an
    STOCK_LAKE_REGION: us-east-1
    POLYGON_S3_ENDPOINT: "https://files.massive.com"
    POLYGON_S3_BUCKET: "flatfiles"
    # Overridable per-build via --environment-variables-override.
    MIRROR_DATASETS: "minute_aggs_v1 session_aggs_v1 trades_v1"
    MIRROR_START_YEAR: "2017"
    MIRROR_END_YEAR: "2026"
    # 12 workers: higher rates (e.g. 48) trip Polygon's 429 rate limit. The
    # script also retries 429/5xx with backoff, but low concurrency avoids them.
    MIRROR_WORKERS: "12"
    MIRROR_DRY_RUN: ""
  secrets-manager:
    POLYGON_S3_ACCESS_KEY_ID: "polygon/flatfiles:access_key_id"
    POLYGON_S3_SECRET_ACCESS_KEY: "polygon/flatfiles:secret_access_key"

phases:
  install:
    runtime-versions:
      python: 3.12
    commands:
      - echo "=== install ==="
      - python --version
      - pip install --upgrade pip
      - pip install poetry==1.8.3
      - poetry config virtualenvs.create false
      - poetry install --without dev --no-interaction --no-ansi

  pre_build:
    commands:
      - echo "=== pre_build ==="
      - 'echo "Region        $AWS_REGION"'
      - 'echo "Lake bucket   $STOCK_LAKE_BUCKET"'
      - 'echo "Datasets      $MIRROR_DATASETS"'
      - 'echo "Years         $MIRROR_START_YEAR-$MIRROR_END_YEAR"'
      - 'echo "Workers       $MIRROR_WORKERS"'
      - 'echo "Dry run       ${MIRROR_DRY_RUN:-(no)}"'
      - 'echo "Build ID      $CODEBUILD_BUILD_ID"'
      # Sanity: our lake bucket writable-listable, and Polygon's bucket reachable
      # for all 4 exchanges. Fail the build early (loudly) if not.
      - aws s3 ls "s3://$STOCK_LAKE_BUCKET/" | head -5
      - |
        python -c "
        import boto3, sys
        c = boto3.client('s3', endpoint_url='$POLYGON_S3_ENDPOINT',
                         aws_access_key_id='$POLYGON_S3_ACCESS_KEY_ID',
                         aws_secret_access_key='$POLYGON_S3_SECRET_ACCESS_KEY',
                         region_name='us-east-1')
        bad = []
        for pfx in ['us_futures_cme','us_futures_cbot','us_futures_comex','us_futures_nymex']:
            r = c.list_objects_v2(Bucket='$POLYGON_S3_BUCKET',
                                  Prefix=f'{pfx}/minute_aggs_v1/2024/01/', MaxKeys=1)
            ok = len(r.get('Contents', [])) > 0
            print(f'{pfx}: {\"OK\" if ok else \"NO FILES\"}')
            if not ok: bad.append(pfx)
        if bad:
            print('PRE-BUILD FAILED: unreachable/empty:', bad); sys.exit(1)
        "

  build:
    commands:
      - echo "=== build ==="
      - |
        DRY=""
        if [ "${MIRROR_DRY_RUN:-}" = "true" ]; then DRY="--dry-run"; fi
        poetry run python scripts/polygon_futures_mirror.py \
          --datasets $MIRROR_DATASETS \
          --start-year "$MIRROR_START_YEAR" \
          --end-year "$MIRROR_END_YEAR" \
          --workers "$MIRROR_WORKERS" \
          $DRY

  post_build:
    commands:
      - echo "=== post_build ==="
      - 'echo "Build succeeding  $CODEBUILD_BUILD_SUCCEEDING"'
      - aws s3 cp "s3://$STOCK_LAKE_BUCKET/polygon_flatfiles_mirror/_manifest.json" - 2>/dev/null || echo "(no manifest — build may have failed before reconcile)"
