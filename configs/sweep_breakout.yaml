strategy: alert_driven
strategy_params:
  source: breakout
  source_params: { lookback: 20, vol_mult: 1.5, reward_risk_mult: 2.0 }
  risk_pct: 0.01
  min_reward_risk: 1.5
symbols: [AAPL, MSFT, NVDA, AMD, TSLA, META, AMZN, GOOGL, AVGO, NFLX, SPY, QQQ]
interval: 1d
starting_cash: 40000
history_window: 250
windows:
  - { label: "2022-2023", start: 2022-01-01T00:00:00Z, end: 2023-12-31T23:59:59Z }
  - { label: "2024-2025", start: 2024-01-01T00:00:00Z, end: 2025-12-31T23:59:59Z }
