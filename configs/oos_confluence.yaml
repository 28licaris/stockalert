strategy: alert_driven
base:
  source: divergence
  source_params: { lookback: 60, pivot_k: 3, reward_risk_mult: 3.0, kind: both }
  risk_pct: 0.01
  max_risk_pct: 0.05
  filter_mode: score
  min_reward_risk: 0.0
grid:
  base_params:
    min_score: [2, 3, 4]
  filter_sets:
    - [{name: trend, params: {period: 50}}, {name: regime, params: {ma_period: 50}}, {name: relative_strength, params: {lookback: 60}}, {name: rsi_bull, params: {threshold: 50}}, {name: macd_bull}]
symbols: [AAPL, MSFT, NVDA, AMD, TSLA, META, AMZN, GOOGL, AVGO, NFLX, SPY, QQQ]
benchmark: SPY
interval: 1d
starting_cash: 40000
history_window: 250
dev:     { start: 2022-01-01T00:00:00Z, end: 2023-12-31T23:59:59Z }
holdout: { start: 2024-01-01T00:00:00Z, end: 2025-12-31T23:59:59Z }
objective: mean_trade_pnl
min_trades: 10
