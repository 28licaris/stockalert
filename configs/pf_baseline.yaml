strategy: alert_driven
strategy_params:
  source: divergence
  source_params: { lookback: 60, pivot_k: 3, reward_risk_mult: 3.0, kind: both, side: both }
  filters:
    - { name: trend, params: { period: 50 } }
    - { name: regime, params: { ma_period: 50 } }
    - { name: rsi_bull, params: { threshold: 50 } }
    - { name: macd_bull }
  filter_mode: score
  min_score: 3
  risk_pct: 0.01
  max_risk_pct: 0.05
  min_reward_risk: 0.0
symbols: [AAPL, MSFT, NVDA, AMD, TSLA, META, AMZN, GOOGL, AVGO, NFLX, SPY, QQQ]
benchmark: SPY
interval: 1d
starting_cash: 100000
history_window: 300
max_concurrent_positions: 6
max_portfolio_heat: 0.10
start: 2022-01-01T00:00:00Z
end: 2025-12-31T23:59:59Z
