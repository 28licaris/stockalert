strategy: alert_driven
strategy_params:
  source: breakout
  source_params: { lookback: 20, vol_mult: 1.5, reward_risk_mult: 3.0 }
  filters:
    - { name: regime, params: { ma_period: 50 } }
    - { name: adx, params: { threshold: 20 } }
    - { name: htf_trend, params: { weeks: 20 } }
    - { name: not_extended, params: { period: 20, max_atr: 4 } }
    - { name: rel_volume, params: { period: 50, mult: 1.2 } }
  filter_mode: all
  min_score: 5
  risk_pct: 0.01
  max_risk_pct: 0.05
  min_reward_risk: 0.0
symbols: [IBM, ORCL, NFLX, TSM, TXN, KLAC, LRCX, MS, WFC, KO, SBUX, JNJ, RBLX, RIVN, SNAP, PINS, LYFT, XLF, XLK, XLI, XLV, XLY, XLP, XLB]
benchmark: SPY
interval: 1d
starting_cash: 100000
history_window: 300
max_concurrent_positions: 8
max_portfolio_heat: 0.12
start: 2022-01-01T00:00:00Z
end: 2025-12-31T23:59:59Z
