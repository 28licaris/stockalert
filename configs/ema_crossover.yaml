# TA-3.5 baseline — EMA Crossover on AAPL daily.
#
# Direct A/B vs the SMA Crossover canary: same logic, same window,
# different MA family. EMA weights recent prices more heavily so:
#   - signal fires earlier on real moves,
#   - whips more often during chop.
#
# Defaults of 12/26 mirror MACD's fast/slow periods (the canonical
# trend-following EMA pair). The SMA canary uses 20/50 — the
# comparison surfaces both "EMA vs SMA" AND "fast vs slow" effects.
#
# Run:
#   poetry run python scripts/run_backtest.py \
#     --config configs/ema_crossover.yaml

strategy: ema_crossover
strategy_params:
  fast_period: 12
  slow_period: 26
  position_size_pct: 0.95

config:
  symbols: [AAPL]
  start: "2023-01-01T00:00:00Z"
  end:   "2024-12-31T23:59:59Z"
  interval: "1d"
  provider: "polygon"
  starting_cash: 40000.0
  history_window: 200
  fees_model: per_share
  fees_params:
    per_share: 0.005
    min_commission: 1.00
  slippage_model: next_bar_open
