services:
  postgres:
    image: postgres:16-alpine
    container_name: stockalert_identity_postgres
    environment:
      POSTGRES_DB: stockalert_identity
      POSTGRES_USER: stockalert
      POSTGRES_PASSWORD: stockalert_dev
    ports:
      - "5432:5432"
    volumes:
      - identity_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stockalert -d stockalert_identity"]
      interval: 3s
      timeout: 3s
      retries: 10
    profiles:
      - identity
      - full

  postgres-test:
    image: postgres:17-alpine
    container_name: stockalert_identity_postgres_test
    environment:
      POSTGRES_DB: stockalert_identity_test
      POSTGRES_USER: stockalert
      POSTGRES_PASSWORD: stockalert_test
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stockalert -d stockalert_identity_test"]
      interval: 2s
      timeout: 3s
      retries: 10
    profiles:
      - identity-test

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: stockalert_clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - chdata:/var/lib/clickhouse
    environment:
      CLICKHOUSE_DB: stocks
      CLICKHOUSE_USER: default
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    restart: unless-stopped
    profiles:
      - ch
      - full

  api:
    build: .
    container_name: stockalert_api
    environment:
      DATA_PROVIDER: ${DATA_PROVIDER:-alpaca}
      ALPACA_API_KEY: ${ALPACA_API_KEY}
      ALPACA_SECRET_KEY: ${ALPACA_SECRET_KEY}
      ALPACA_FEED: ${ALPACA_FEED:-iex}
      POLYGON_API_KEY: ${POLYGON_API_KEY:-}
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: "8123"
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-}
      CLICKHOUSE_DATABASE: ${CLICKHOUSE_DATABASE:-stocks}
      IDENTITY_DATABASE_URL: ${IDENTITY_DATABASE_URL:-postgresql+psycopg://stockalert:stockalert_dev@postgres:5432/stockalert_identity}
      DATA_SOURCE_TAG: ${DATA_PROVIDER:-alpaca}
      USE_TREND_FILTER: ${USE_TREND_FILTER:-true}
      EMA_PERIOD: ${EMA_PERIOD:-50}
      LOOKBACK_BARS: ${LOOKBACK_BARS:-60}
      PIVOT_K: ${PIVOT_K:-3}
      ALERT_WEBHOOK_URL: ${ALERT_WEBHOOK_URL:-}
      ALERT_MIN_SEPARATION_MIN: ${ALERT_MIN_SEPARATION_MIN:-15}
      TICKERS: ${TICKERS:-QQQ,SPY}
      INDICATOR: ${INDICATOR:-rsi}
      SIGNAL_TYPE: ${SIGNAL_TYPE:-hidden_bullish_divergence}
    command: ["uvicorn", "app.main_api:app", "--host", "0.0.0.0", "--port", "8000"]
    ports: ["8000:8000"]
    profiles:
      - full
    depends_on:
      clickhouse:
        condition: service_started
      postgres:
        condition: service_healthy

volumes:
  chdata:
  identity_pgdata:
