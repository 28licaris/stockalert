AWSTemplateFormatVersion: "2010-09-09"
Description: StockAlert customer authentication resources

Parameters:
  EnvironmentName:
    Type: String
    AllowedPattern: "[a-z0-9-]+"
  DomainPrefix:
    Type: String
    AllowedPattern: "[a-z0-9-]+"
  CallbackUrls:
    Type: CommaDelimitedList
  LogoutUrls:
    Type: CommaDelimitedList
  EnableGoogle:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
  GoogleClientId:
    Type: String
    Default: ""
  GoogleClientSecret:
    Type: String
    Default: ""
    NoEcho: true

Conditions:
  GoogleEnabled: !Equals [!Ref EnableGoogle, "true"]

Resources:
  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub stockalert-${EnvironmentName}
      UserPoolTier: ESSENTIALS
      UsernameAttributes: [email]
      AutoVerifiedAttributes: [email]
      MfaConfiguration: OPTIONAL
      EnabledMfas: [SOFTWARE_TOKEN_MFA]
      AccountRecoverySetting:
        RecoveryMechanisms:
          - Name: verified_email
            Priority: 1
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: false
      Policies:
        PasswordPolicy:
          MinimumLength: 12
          RequireLowercase: true
          RequireUppercase: true
          RequireNumbers: true
          RequireSymbols: true
          TemporaryPasswordValidityDays: 7
      UserAttributeUpdateSettings:
        AttributesRequireVerificationBeforeUpdate: [email]
      UserPoolTags:
        application: stockalert
        environment: !Ref EnvironmentName

  UserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      Domain: !Ref DomainPrefix
      UserPoolId: !Ref UserPool

  GoogleIdentityProvider:
    Type: AWS::Cognito::UserPoolIdentityProvider
    Condition: GoogleEnabled
    Properties:
      ProviderName: Google
      ProviderType: Google
      UserPoolId: !Ref UserPool
      ProviderDetails:
        client_id: !Ref GoogleClientId
        client_secret: !Ref GoogleClientSecret
        authorize_scopes: openid email profile
      AttributeMapping:
        email: email
        name: name
        username: sub

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub stockalert-dashboard-${EnvironmentName}
      UserPoolId: !Ref UserPool
      GenerateSecret: true
      AllowedOAuthFlowsUserPoolClient: true
      AllowedOAuthFlows: [code]
      AllowedOAuthScopes: [openid, email, profile]
      CallbackURLs: !Ref CallbackUrls
      LogoutURLs: !Ref LogoutUrls
      SupportedIdentityProviders: !If
        - GoogleEnabled
        - [COGNITO, Google]
        - [COGNITO]
      EnableTokenRevocation: true
      PreventUserExistenceErrors: ENABLED
      AccessTokenValidity: 1
      IdTokenValidity: 1
      RefreshTokenValidity: 30
      TokenValidityUnits:
        AccessToken: hours
        IdToken: hours
        RefreshToken: days

Outputs:
  UserPoolId:
    Value: !Ref UserPool
  ClientId:
    Value: !Ref UserPoolClient
  Issuer:
    Value: !Sub https://cognito-idp.${AWS::Region}.${AWS::URLSuffix}/${UserPool}
  HostedUiDomain:
    Value: !Sub https://${DomainPrefix}.auth.${AWS::Region}.amazoncognito.com
